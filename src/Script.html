<script>
  let usuarioLogado = null;

  // Inicialização Automática de Datas
  const hoje = new Date();
  const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
  const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).toISOString().split('T')[0];
  
  document.getElementById('filtroDataInicio').value = primeiroDia;
  document.getElementById('filtroDataFim').value = ultimoDia;

  function showView(viewId) {
    const views = ['viewHome', 'viewLogin', 'viewDashboard'];
    views.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    });
    
    const targetEl = document.getElementById(viewId);
    if (targetEl) targetEl.classList.remove('hidden');
    
    if (usuarioLogado) {
      document.getElementById('userInfo').classList.remove('hidden');
      document.getElementById('userLoggedName').innerText = usuarioLogado.nome;
      document.getElementById('userLoggedRole').innerText = usuarioLogado.cargo;
    } else {
      document.getElementById('userInfo').classList.add('hidden');
    }
  }

  // Gerenciador de Tema
  (function verificarTemaInicial() {
    const temaSalvo = localStorage.getItem('theme');
    if (temaSalvo === 'dark') {
      document.documentElement.classList.add('dark');
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('themeIcon').innerText = '☀️';
      });
    } else {
      document.documentElement.classList.remove('dark');
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('themeIcon').innerText = '🌙';
      });
    }
  })();

  function toggleDarkMode() {
    const html = document.documentElement;
    const icone = document.getElementById('themeIcon');
    
    if (html.classList.contains('dark')) {
      html.classList.remove('dark');
      icone.innerText = '🌙';
      localStorage.setItem('theme', 'light');
      showToast('Modo Claro ativado', 'sucesso');
    } else {
      html.classList.add('dark');
      icone.innerText = '☀️';
      localStorage.setItem('theme', 'dark');
      showToast('Modo Escuro ativado', 'sucesso');
    }
  }

  function protectedAction(targetView) {
    if (!usuarioLogado) {
      showToast('Acesso Restrito: Faça login primeiro.', 'erro');
      showView('viewLogin');
    } else {
      showView('viewDashboard');
    }
  }

  function handleLogin(event) {
    event.preventDefault();
    const usuario = document.getElementById('loginUsuario').value;
    const senha = document.getElementById('loginSenha').value;
    const btn = document.getElementById('btnLogar');
    
    setLoading(btn, true, 'Autenticando...');

    google.script.run
      .withSuccessHandler(function(resposta) {
        setLoading(btn, false, 'Entrar no Sistema');
        if (resposta.sucesso) {
          usuarioLogado = resposta.usuario;
          document.getElementById('formLogin').reset();
          showToast(`Bem-vindo, ${usuarioLogado.nome}!`, 'sucesso');
          
          showView('viewDashboard');
          
          if (usuarioLogado.cargo === 'Admin') {
            document.getElementById('containerFiltroAdmin').classList.remove('hidden');
            google.script.run
              .withSuccessHandler(function(funcionarios) {
                const select = document.getElementById('filtroFuncionarioAdmin');
                select.innerHTML = '<option value="todos">-- TODOS OS TÉCNICOS --</option>';
                
                funcionarios.forEach(func => {
                  const opt = document.createElement('option');
                  opt.value = func.login;
                  opt.innerText = `${func.nome}`;
                  select.appendChild(opt);
                });
                carregarDadosDashboard();
              })
              .listarFuncionarios();
          } else {
            document.getElementById('containerFiltroAdmin').classList.add('hidden');
            carregarDadosDashboard();
          }
        } else {
          showToast(resposta.mensagem, 'erro');
        }
      })
      .withFailureHandler(function() {
        setLoading(btn, false, 'Entrar no Sistema');
        showToast('Erro crítico no servidor.', 'erro');
      })
      .autenticarUsuario(usuario, senha);
  }

function carregarDadosDashboard() {
    if (!usuarioLogado) return;

    const dataInicio = document.getElementById('filtroDataInicio').value;
    const dataFim = document.getElementById('filtroDataFim').value;
    
    let loginTarget = usuarioLogado.login;
    let nomeRelatorio = usuarioLogado.nome;

    if (usuarioLogado.cargo === 'Admin') {
      const selectAdmin = document.getElementById('filtroFuncionarioAdmin');
      if (selectAdmin.options.length > 0) {
        loginTarget = selectAdmin.value;
        nomeRelatorio = selectAdmin.options[selectAdmin.selectedIndex].text;
      }
    }

    const dIniFormatada = dataInicio.split('-').reverse().join('/');
    const dFimFormatada = dataFim.split('-').reverse().join('/');
    document.getElementById('subtituloFiltroImpressao').innerText = `Período: de ${dIniFormatada} até ${dFimFormatada} | Filtro: ${nomeRelatorio}`;

    google.script.run
      .withSuccessHandler(function(resposta) {
        if (resposta.sucesso) {
          // 1. Atualização dos Cards Superiores
          document.getElementById('metricTotalPeriodo').innerText = resposta.metricas.totalElementos;
          document.getElementById('metricFaturamentoPeriodo').innerText = resposta.metricas.faturamentoTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
          document.getElementById('metricTicketMedio').innerText = resposta.metricas.ticketMedio.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
          
          /*const labelBI = document.getElementById('labelTopBI');
          const valueBI = document.getElementById('valueTopBI');
          if (loginTarget === "todos") {
            labelBI.innerText = "Top Produtor (Equipe)";
            valueBI.innerText = `${resposta.metricas.topTecnico} (${resposta.metricas.topTecnicoQtd} el.)`;
          } else {
            labelBI.innerText = "Maior Giro (Trabalho)";
            valueBI.innerText = `${resposta.metricas.topItem} (${resposta.metricas.topItemQtd} el.)`;
          }*/

          // 2. Montagem Dinâmica das Colunas da Tabela
          const headerRow = document.getElementById('tableHeaderRow');
          const isAdminTodos = (loginTarget === "todos");
          
          headerRow.innerHTML = `
            <th style="padding: 10px; font-weight: 600;">Data/Hora</th>
            ${isAdminTodos ? '<th style="padding: 10px; font-weight: 600;">Técnico</th>' : ''}
            <th style="padding: 10px; font-weight: 600;">Dentista</th>
            <th style="padding: 10px; font-weight: 600;">Paciente</th>
            <th style="padding: 10px; font-weight: 600;">Trabalho</th>
            <th style="padding: 10px; font-weight: 600; text-align: center;">Qtd</th>
            <th style="padding: 10px; font-weight: 600; text-align: right;">Subtotal</th>
          `;
          
          // 3. Renderização Segura das Linhas da Tabela
          const tbody = document.getElementById('tableCorpoProdutividade');
          const tabelaPai = tbody.parentElement; // Elemento <table>
          tbody.innerHTML = '';
          
          // Limpa qualquer rodapé antigo antes de recalcular
          const tfootAntigo = tabelaPai.querySelector('tfoot');
          if (tfootAntigo) tfootAntigo.remove();
          
          if (resposta.registros.length === 0) {
            document.getElementById('tableVaziaMsg').classList.remove('hidden');
          } else {
            document.getElementById('tableVaziaMsg').classList.add('hidden');
            
            // Variáveis locais para acumular os totais que irão para a impressão
            let acumuladorQtd = 0;
            let acumuladorFaturamento = 0;
            
            resposta.registros.forEach(reg => {
              // Incrementa os acumuladores
              acumuladorQtd += parseInt(reg.quantidade || 0);
              acumuladorFaturamento += parseFloat(reg.subtotal || 0);
              
              const tr = document.createElement('tr');
              tr.className = 'border-b border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800/50 text-slate-800 dark:text-slate-100';
              
              tr.innerHTML = `
                <td style="padding: 10px;" class="font-medium">${reg.data}</td>
                ${isAdminTodos ? `<td style="padding: 10px;" class="font-semibold uppercase text-xs tracking-wider text-slate-700 dark:text-slate-300">${reg.usuario}</td>` : ''}
                <td style="padding: 10px;" class="text-slate-600 dark:text-slate-300">${reg.dentista}</td>
                <td style="padding: 10px;" class="font-semibold text-slate-900 dark:text-slate-100">${reg.paciente}</td>
                <td style="padding: 10px;" class="text-slate-600 dark:text-slate-300">${reg.producao}</td>
                <td style="padding: 10px; text-align: center;" class="text-slate-500 dark:text-slate-400">${reg.quantidade}</td>
                <td style="padding: 10px; text-align: right;" class="font-bold text-teal-600 dark:text-emerald-400">${reg.subtotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
              `;
              tbody.appendChild(tr);
            });
          }
          
          showView('viewDashboard');
        } else {
          showToast(resposta.mensagem, 'erro');
        }
      })
      .buscarDadosDashboard(loginTarget, dataInicio, dataFim);
  }

  function handleSalvarProdutividade(event) {
    event.preventDefault();
    const btn = document.getElementById('btnSalvarProd');
    
    const dados = {
      usuario_login: usuarioLogado.login,
      dentista: document.getElementById('prodDentista').value,
      paciente: document.getElementById('prodPaciente').value,
      producao: document.getElementById('prodProducao').value,
      quantidade: document.getElementById('prodQuantidade').value,
      valor: document.getElementById('prodValorUnitario').value
    };

    setLoading(btn, true, 'Salvando...');

    google.script.run
      .withSuccessHandler(function(resposta) {
        setLoading(btn, false, 'Registrar Trabalho');
        if (resposta.sucesso) {
          showToast(resposta.mensagem, 'sucesso');
          document.getElementById('prodPaciente').value = '';
          document.getElementById('prodProducao').value = '';
          document.getElementById('prodQuantidade').value = '1';
          document.getElementById('prodValorUnitario').value = '';
          carregarDadosDashboard(); 
        } else {
          showToast(resposta.mensagem, 'erro');
        }
      })
      .withFailureHandler(function() {
        setLoading(btn, false, 'Registrar Trabalho');
        showToast('Falha técnica ao salvar.', 'erro');
      })
      .salvarProdutividade(dados);
  }

  function criarRelatorio() {
    const tbody = document.getElementById('tableCorpoProdutividade');
    if (tbody.children.length === 0) {
      showToast('Não existem registros no período selecionado para gerar o relatório.', 'erro');
      return;
    }
    window.print();
  }

  function logout() {
    usuarioLogado = null;
    showToast('Sessão encerrada.', 'sucesso');
    showView('viewHome');
  }

  function showToast(mensagem, tipo) {
    const toast = document.getElementById('toast');
    toast.innerText = mensagem;
    
    toast.className = "hidden fixed bottom-5 right-5 z-50 max-w-sm w-full shadow-lg rounded-xl p-4 transition-all duration-300 border";
    
    toast.classList.add(
        'bg-white',                // Fundo branco
        'border-slate-200',        // Borda cinza clara
        'text-slate-900',          // Texto cinza escuro
        'dark:bg-slate-800',       // Fundo escuro (se usar dark mode)
        'dark:border-slate-700',   // Borda escura
        'dark:text-white'          // Texto claro no dark mode
    );

    // Se quiser manter uma pequena indicação de cor na borda esquerda:
    if (tipo === 'sucesso') {
        toast.classList.add('border-l-4', 'border-l-emerald-500');
    } else {
        toast.classList.add('border-l-4', 'border-l-rose-500');
    }
    
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
  }

  function setLoading(btnElement, isLoading, text) {
    btnElement.disabled = isLoading;
    btnElement.innerHTML = text;
    if (isLoading) btnElement.classList.add('opacity-50', 'cursor-not-allowed');
    else btnElement.classList.remove('opacity-50', 'cursor-not-allowed');
  }
</script>
