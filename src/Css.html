<style>
  /* Transição suave global */
  body, nav, section, main, div, input, select, textarea, button, table, footer {
    transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
  }

  /* --- REGRAS EXCLUSIVAS PARA O MODO CLARO (PADRÃO) --- */
  /* Força cores escuras e de alto contraste quando a classe .dark NÃO está no HTML */
  html:not(.dark) body {
    background-color: #f8fafc !important; /* Slate 50 */
    color: #0f172a !important;            /* Slate 900 */
  }

  html:not(.dark) table tbody tr td {
    color: #334155 !important; /* Slate 700: Texto perfeitamente legível no modo claro */
  }

  html:not(.dark) table tbody tr td.font-semibold {
    color: #0f172a !important; /* Slate 900 para Pacientes e Destaques */
  }

  html:not(.dark) .text-slate-600, html:not(.dark) .text-slate-500 {
    color: #475569 !important; /* Força cinza escuro para descrições secundárias */
  }

  /* --- MODO ESCURO COMPLETO (PALETA DRACULA) --- */
  html.dark body {
    background-color: #282a36 !important;
    color: #f8f8f2 !important;
  }

  /* Forçar os containers, cards e blocos no modo escuro */
  html.dark nav, 
  html.dark footer, 
  html.dark #viewLogin, 
  html.dark #viewCadastro, 
  html.dark #areaRelatorioImpresso,
  html.dark .bg-white,
  html.dark .bg-slate-50 {
    background-color: #1e1f29 !important;
    border-color: #44475a !important;
    color: #f8f8f2 !important;
  }

  /* Correção de Títulos e Textos no modo escuro */
  html.dark h1, html.dark h2, html.dark h3, html.dark label, html.dark th {
    color: #f8f8f2 !important;
  }
  
  html.dark p, html.dark .text-slate-400, html.dark .text-slate-500, html.dark .text-slate-600 {
    color: #6272a4 !important; /* Dracula Comment */
  }

  html.dark table tbody tr td {
    color: #f8f8f2 !important;
  }

  /* Realces cromáticos de BI */
  html.dark #metricFaturamentoPeriodo, html.dark table tbody tr td.text-teal-600 {
    color: #50fa7b !important; /* Verde vibrante Dracula */
  }
  html.dark #metricTicketMedio {
    color: #8be9fd !important; /* Ciano vibrante Dracula */
  }

  /* Inputs e Caixas de Seleção no modo Dracula */
  html.dark input, html.dark select, html.dark textarea {
    background-color: #282a36 !important;
    border-color: #44475a !important;
    color: #f8f8f2 !important;
  }

  /* Elementos da Tabela no Painel Escuro */
  html.dark table thead tr {
    background-color: #44475a !important;
  }
  html.dark table thead th {
    color: #50fa7b !important;
    border-bottom: 2px solid #44475a !important;
  }

  /* --- AJUSTE DE LAYOUT: RESPONSIVIDADE DA TABELA (EVITAR CORTES) --- */
  /* Garante que a tabela use layout fixo ou flexível que não vaze o card */
  table {
    table-layout: auto !important;
    width: 100% !important;
  }

  /* Diminui levemente o preenchimento interno em telas menores para caber todas as colunas */
  th, td {
    padding: 8px 6px !important; 
    font-size: 13px !important;
  }

/* --- CONFIGURAÇÕES DE IMPRESSÃO --- */
  @media print {
    html, body { 
      background-color: #ffffff !important; 
      color: #000000 !important; 
    }
    
    /* Oculta tudo que não pertence ao fechamento físico de papel */
    nav, footer, #viewHome, #viewLogin, #viewCadastro, 
    .no-print, button, input, select,
    #cardTicketMedio,
    #cardMaiorGiro,
    #cardElementosFeitos, /* Adicione o ID do card de Elementos Feitos */
    .barra-lateral-menu {
      display: none !important;
    }
    
    main { 
      max-width: 100% !important; 
      width: 100% !important; 
      padding: 0 !important; 
      margin: 0 !important; 
    }
    #areaRelatorioImpresso {
        display: block !important;
        width: 100% !important;
    }
    
    #viewDashboard {
      display: block !important; 
    }
    #cardFaturamentoBruto {
      display: none !important;
    }
    
    .print-area { 
      border: none !important; 
      box-shadow: none !important; 
      width: 100% !important; 
      background-color: #ffffff !important; 
    }
    
    /* Otimização da Tabela para Impressão limpa */
    table { 
      width: 100% !important; 
      border-collapse: collapse !important; 
    }
    th, td { 
      border-bottom: 1px solid #94a3b8 !important; 
      padding: 8px !important; 
      color: #000000 !important; 
    }
    th { 
      background-color: #f1f5f9 !important; 
      font-weight: bold !important; 
    }
    #subtituloFiltroImpressao { 
      color: #475569 !important; 
    }
    
    /* Forçar exibição em bloco de marcas de água/cabeçalhos específicos de impressão */
    .print-block { 
      display: block !important; 
    }
  }
</style>
